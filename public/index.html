<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GrowFit</title>
    <meta
      name="description"
      content="GrowFitは、筋トレの記録と継続をシンプルに支えるトレーニングアプリです。iOS版近日公開。"
    />
    <style>
      :root {
        color-scheme: light;
        font-family:
          "Inter", "Noto Sans JP", system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: #17211b;
        background: #f5f7f1;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px 20px;
      }

      main {
        width: min(680px, 100%);
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border: 1px solid #bfd4c5;
        border-radius: 999px;
        color: #315641;
        background: #ffffff;
        font-size: 14px;
        font-weight: 700;
      }

      h1 {
        margin: 28px 0 16px;
        font-size: clamp(44px, 8vw, 82px);
        line-height: 0.95;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        max-width: 580px;
        color: #4c5d52;
        font-size: 18px;
        line-height: 1.8;
      }

      footer {
        margin-top: 40px;
        color: #667269;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <main>
      <span class="badge">iOS版 近日公開</span>
      <h1>GrowFit</h1>
      <p>
        筋トレの記録、テンプレート、成長の振り返りをひとつにまとめるアプリです。
        正式なランディングページは現在準備中です。
      </p>
      <footer>© Kouhei Yano</footer>
    </main>
  </body>
</html>
